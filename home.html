<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="./CSS/estilo.css">
    <style>
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border: 1px solid #dfe6e9;
        }

        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tbody tr:hover {
            background-color: #ebf5fb;
            transition: 0.3s;
        }

        .porcentaje {
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    <header id="encabezado">
        <nav id="encabezado__nav">
            <div class="encabezado__div">
                <img src="./IMG/log.png" alt="Logo del parqueadero" class="logo">
                <h2 class="nombre__parqueo">CampusParking</h2>
            </div>
            <a href="./perfil.html"><img src="./IMG/perfil.png" alt="Icono de perfil" class="perfil"></a>
        </nav>
    </header>
    <main>
        <section>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Tipo de vehiculos</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Carro</td>
                            <td>$10.00</td>
                        </tr>
                        <tr>
                            <td>motocicleta</td>
                            <td>$8.00</td>
                        </tr>
                        <tr>
                            <td>Bicicleta</td>
                            <td>$6.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <section>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Tipo de Vehículo</th>
                            <th>Marca / Modelo</th>
                            <th>Porcentaje</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Carros -->
                        <tr>
                            <td rowspan="3" class="categoria">Carros (Aston Martin)</td>
                            <td>V8 Vantage</td>
                            <td>15%</td>
                        </tr>
                        <tr>
                            <td>DBS</td>
                            <td>15%</td>
                        </tr>
                        <tr>
                            <td>DB9</td>
                            <td>15%</td>
                        </tr>
            
                        <!-- Motos -->
                        <tr>
                            <td rowspan="3" class="categoria">Motos</td>
                            <td>Yamaha</td>
                            <td>10%</td>
                        </tr>
                        <tr>
                            <td>Honda</td>
                            <td>10%</td>
                        </tr>
                        <tr>
                            <td>Suzuki</td>
                            <td>10%</td>
                        </tr>
            
                        <!-- Bicicletas -->
                        <tr>
                            <td rowspan="3" class="categoria">Bicicletas</td>
                            <td>Trek</td>
                            <td>5%</td>
                        </tr>
                        <tr>
                            <td>Scott</td>
                            <td>5%</td>
                        </tr>
                        <tr>
                            <td>Orbea</td>
                            <td>5%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
   
    </main>
</body>
</html>
