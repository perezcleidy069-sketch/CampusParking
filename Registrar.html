<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar vehículo</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <header id="header">
        <div class="head__div">
            <a href="./index.html"><img src="./IMG/regresar.png" alt="Flecha para regresar" class="Flecha"></a>
            <div class="div__logo">
                <img src="./IMG/log.png" alt="Logo del parqueadero" class="logo">
                <h2 class="nombre__parqueo">CampusParking</h2>
            </div>
        </div>
    </header><hr>
    <main class="main">
        <form id="formulario">
            <h2 class="texto">Registro del vehículo</h2>
            <label for="text">Nombre del propetario:</label><br>
            <input type="text" id="propetario" required><br>
            <label for="text">Seleccion el tipo de vehículo:</label><br>
            
            <select id="car" required>
                <option value="">Selecione..</option>
                <option value="option1" data-prefix="ABC"="">Carro</option>
                <option value="option2" data-prefix="MT">Moto</option>
                <option value="option3" data-prefix="B"="">Bicicleta</option>
            </select><br>

            <label for="text">Placa del vehículo:</label><br>
            <div class="estilo__div" >
                <b id="placaFija" style="min-width: 40px;">---</b>
                <input type="text" id="place" maxlength="5" required id="lugar"><br>
            </div>

            <label for="text" >Fecha que ingresa:</label><br>
            <input type="date"  id="fecha" required><br>
            <label for="text">Hora de entrada:</label><br>
            <input type="time" id="hora" required><br>

            <div>
                <a href="./asignarLugar.html" >Asignar Lugar <span id="botons" class="seleccionar__boton"></span></a><br>
                <a href="./marcasVehiculos.html">Seleccionar Marca del vehículo: <span id="marca" class="seleccionar__boton"></span></a>
            </div>

            <input type="hidden" id="lugarOculto">
            <input type="hidden" id="marcaOculta">
            <button type="submit">Registrar ingreso</button>
            <button class="boto" id="botons">Mostrar</button>
        </form>
    </main>
    <script src="./javascripts/registar.js"></script>
</body>
</html>
